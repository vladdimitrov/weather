  <script>
    (function() {
      const savedLanguage = localStorage.getItem('selectedLanguage') || 'en';
      document.documentElement.lang = savedLanguage;

      const savedBackground = localStorage.getItem('defaultBackground') || 'blue';
      function applyBackgroundImmediately(background) {
        let style = '';
        switch (background) {
          case "default":
            style = "linear-gradient(135deg, #a8c0ff, #3f2b96)";
            break;
          case "blue":
            style = "linear-gradient(135deg, #00c6ff, #0072ff)";
            break;
          case "dark":
            style = "linear-gradient(135deg, #232526, #414345)";
            break;
          case "green":
            style = "linear-gradient(135deg, #11998e, #38ef7d)";
            break;
          case "purple":
            style = "linear-gradient(135deg, #834d9b, #d04ed6)";
            break;
          case "red":
            style = "linear-gradient(135deg, #cb2d3e, #ef473a)";
            break;
          default:
            style = "linear-gradient(135deg, #a8c0ff, #3f2b96)";
        }
        document.body.style.background = style;
      }
      applyBackgroundImmediately(savedBackground);
    })();
  </script>

  // Function to update contacts page content based on language
  function updateContactsContent(language) {

	const weatherMapsLink = document.getElementById('weather-maps');

      contactsTitle.textContent = contactsTranslations[language].contactsTitle;
    }
    
    if (contactsDescription) {
      contactsDescription.textContent = contactsTranslations[language].contactsDescription;
    }

    }

    }

    }

  }

    document.title = contactsTranslations[language].contactsTitle;
  }
  
  // Header initialization for contacts page
  document.addEventListener('DOMContentLoaded', function() {
    const navHeader = document.querySelector('.nav-header');
    if (navHeader) {
      // Focus on the header when the page loads
      navHeader.focus();
      
      // Scroll to top to ensure header is visible
      window.scrollTo(0, 0);
    }
    
    // Inherit language and background settings from localStorage
    inheritSettingsFromParent();
  });
  
  // Function to inherit settings from the calling page
  function inheritSettingsFromParent() {
    // Get saved language from localStorage (same as index.html)
    const savedLanguage = localStorage.getItem('selectedLanguage') || 'en';
    
    // Get saved background from localStorage (same as index.html)
    const savedBackground = localStorage.getItem('defaultBackground') || 'blue';
    
    // Apply the inherited language setting
    if (savedLanguage) {
      document.documentElement.lang = savedLanguage;
      updateContactsContent(savedLanguage);
      console.log('Inherited language setting:', savedLanguage);
    }
    
    // Apply the inherited background setting immediately
    if (savedBackground) {
      applyInheritedBackground(savedBackground);
      console.log('Inherited background setting:', savedBackground);
    }
  }
  
  // Function to apply inherited background (simplified version of applyBackground from background-selector.js)
  function applyInheritedBackground(background) {
    // Remove any previously applied background classes
    document.body.classList.remove("bg-default", "bg-blue", "bg-dark", "bg-green", "bg-purple", "bg-red");
    
    // Apply the selected background with animation
    document.body.style.transition = "background 0.5s ease";
    
    // Apply the selected background
    switch (background) {
      case "default":
        document.body.style.background = "linear-gradient(135deg, #a8c0ff, #3f2b96)";
        break;
      case "blue":
        document.body.style.background = "linear-gradient(135deg, #00c6ff, #0072ff)";
        break;
      case "dark":
        document.body.style.background = "linear-gradient(135deg, #232526, #414345)";
        break;
      case "green":
        document.body.style.background = "linear-gradient(135deg, #11998e, #38ef7d)";
        break;
      case "purple":
        document.body.style.background = "linear-gradient(135deg, #834d9b, #d04ed6)";
        break;
      case "red":
        document.body.style.background = "linear-gradient(135deg, #cb2d3e, #ef473a)";
        break;
      default:
        document.body.style.background = "linear-gradient(135deg, #a8c0ff, #3f2b96)";
    }
  }
</script>

<script>
  // Listen for language changes from the language-switcher.js
  document.addEventListener('DOMContentLoaded', function() {
    // Wait for language selector to be created
    setTimeout(function() {
      const languageSelect = document.getElementById('language');
      if (languageSelect) {
        // Override the language change event to also update contacts content
        languageSelect.addEventListener('change', function(event) {
          const selectedLanguage = event.target.value;
          // Store in localStorage (this is also done in language-switcher.js but ensuring it's set)
          localStorage.setItem('selectedLanguage', selectedLanguage);
          document.documentElement.lang = selectedLanguage;
          updateContactsContent(selectedLanguage);
        });
        
        // Set initial value from localStorage
        const savedLanguage = localStorage.getItem('selectedLanguage') || 'en';
        languageSelect.value = savedLanguage;
      }
      
      const backgroundSelect = document.getElementById('background-color');
      if (backgroundSelect) {
        // Set initial value from localStorage
        const savedBackground = localStorage.getItem('defaultBackground') || 'blue';
        backgroundSelect.value = savedBackground;
      }
    }, 200);
    
    // Removed form submission handlers as forms are removed
  });
</script>
