  <script>
    (function() {
      const savedLanguage = localStorage.getItem('selectedLanguage') || 'en';
      document.documentElement.lang = savedLanguage;

      const savedBackground = localStorage.getItem('defaultBackground') || 'blue';
      function applyBackgroundImmediately(background) {
        let style = '';
        switch (background) {
          case "default":
            style = "linear-gradient(135deg, #a8c0ff, #3f2b96)";
            break;
          case "blue":
            style = "linear-gradient(135deg, #00c6ff, #0072ff)";
            break;
          case "dark":
            style = "linear-gradient(135deg, #232526, #414345)";
            break;
          case "green":
            style = "linear-gradient(135deg, #11998e, #38ef7d)";
            break;
          case "purple":
            style = "linear-gradient(135deg, #834d9b, #d04ed6)";
            break;
          case "red":
            style = "linear-gradient(135deg, #cb2d3e, #ef473a)";
            break;
          default:
            style = "linear-gradient(135deg, #a8c0ff, #3f2b96)";
        }
        // Add logging to diagnose DOM loading issues
        console.log('DEBUG: Attempting to access document.body, exists:', !!document.body);
        if (document.body) {
          document.body.style.background = style;
        } else {
          console.error('DEBUG: document.body is null when trying to apply background');
        }
      }
      // Add logging for background application
      console.log('DEBUG: Applying background immediately, savedBackground:', savedBackground);
      applyBackgroundImmediately(savedBackground);
    })();
  </script>

  <style>
    @keyframes fade-in {
      0% { opacity: 0; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    #hourlyTableBlock {
      transition: max-height 0.5s ease-out, opacity 0.5s ease;
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
    }
    
    @media (max-width: 768px) {
      #hourlyTableBlock {
        padding: 0 5px;
      }
      #hourlyTableBlock h2 {
        font-size: 1.5em;
      }
    }
    .spinner {
      display: inline-block;
      width: 1em;
      height: 1em;
      border: 2px solid #FFD700;
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 6px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #kp-summary .kp-icon {
      font-size: 2em; /* Increased font size to make the icon more prominent */
      margin-right: 6px;
    }
  </style>

  <div class="container" style="margin-top: calc(var(--header-height) + 20px);">
    <h1 style="text-align: center;" data-translation-key="holidayCalendarTitle">Holiday Calendar</h1>

    <div style="display: flex; flex-direction: column; align-items: center; margin-top: 10px;">
      <div class="form-container">
      <div class="form-group city">
        <label for="city" data-translation-key="cityLabel">City / Resort:</label>
        <input type="text" id="city" data-translation-key="cityPlaceholder" placeholder="e.g. Sofia">
        <div id="citySuggestions" style="display: none;"></div>
      </div>

      <div class="form-group latitude">
        <label for="latitude" data-translation-key="latitudeLabel">Latitude:</label>
        <input type="number" id="latitude" placeholder="e.g. 42.6977">
      </div>

      <div class="form-group longitude">
        <label for="longitude" data-translation-key="longitudeLabel">Longitude:</label>
        <input type="number" id="longitude" placeholder="e.g. 23.3219">
      </div>


      <div class="form-group fromDate">
        <label for="fromDate" data-translation-key="fromDateLabel">From Date:</label>
        <input type="date" id="fromDate">
      </div>

      <div class="form-group toDate">
        <label for="toDate" data-translation-key="toDateLabel">To Date:</label>
        <input type="date" id="toDate">
      </div>
      
      <div class="buttons-container">
        <button id="useLocation" class="btn btn-location" data-translation-key="useLocationButton">📍 Use the current location</button>
        <button id="loadData" class="btn btn-primary pulse" data-translation-key="loadHolidaysButton">Load Holidays</button>
      </div>
      </div>
    <div style="display: flex; justify-content: center; align-items: baseline; margin-top: 10px;">
      <div id="selected-city" style="font-weight: bold; font-size: 1.1em; color: #FFD700; margin-right: 10px;"></div>
      <div id="local-time" style="display: inline-block;"></div>
    </div>
    <div id="calendar" style="max-width: 800px; margin: 20px auto; background: rgba(28, 46, 74, 0.8); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 10px; padding: 20px; box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);">
      <!-- Calendar will be generated here -->
    </div>

    <div id="holidayDetails">
      <!-- Holiday details will be displayed here -->
    </div>

    <div style="text-align: center; margin-top: 20px; margin-bottom: 60px;">
      <button onclick="window.print()" class="btn" data-translation-key="printButton">🖨️ Print</button>
    </div>
