<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Pulse</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>🌤 Weather Pulse</h1>
    <p class="subtitle">Your real-time weather companion</p>
  </header>

  <main>
    <section class="search-section">
      <form id="search-form">
        <input
          type="text"
          id="city-input"
          placeholder="Enter city name…"
          autocomplete="off"
        />
        <button type="submit">Search</button>
      </form>
    </section>

    <section class="weather-card" id="weather-card" hidden>
      <div class="city-name" id="city-name"></div>
      <div class="weather-icon" id="weather-icon"></div>
      <div class="temperature" id="temperature"></div>
      <div class="description" id="description"></div>
      <div class="details">
        <div class="detail-item">
          <span class="detail-label">Humidity</span>
          <span class="detail-value" id="humidity"></span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Wind</span>
          <span class="detail-value" id="wind"></span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Feels like</span>
          <span class="detail-value" id="feels-like"></span>
        </div>
      </div>
    </section>

    <section class="error-card" id="error-card" hidden>
      <p id="error-message"></p>
    </section>

    <section class="api-note">
      <p>
        Enter a city above to fetch live weather data via the
        <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a>
        and
        <a href="https://nominatim.openstreetmap.org/" target="_blank" rel="noopener">OpenStreetMap Nominatim</a>
        free APIs — no API key required.
      </p>
    </section>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> Weather Pulse</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
