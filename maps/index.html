  <script>
    (function() {
      const savedLanguage = localStorage.getItem('selectedLanguage') || 'en';
      document.documentElement.lang = savedLanguage;

      const savedBackground = localStorage.getItem('defaultBackground') || 'blue';
      function applyBackgroundImmediately(background) {
        let style = '';
        switch (background) {
          case "default":
            style = "linear-gradient(135deg, #a8c0ff, #3f2b96)";
            break;
          case "blue":
            style = "linear-gradient(135deg, #00c6ff, #0072ff)";
            break;
          case "dark":
            style = "linear-gradient(135deg, #232526, #414345)";
            break;
          case "green":
            style = "linear-gradient(135deg, #11998e, #38ef7d)";
            break;
          case "purple":
            style = "linear-gradient(135deg, #834d9b, #d04ed6)";
            break;
          case "red":
            style = "linear-gradient(135deg, #cb2d3e, #ef473a)";
            break;
          default:
            style = "linear-gradient(135deg, #a8c0ff, #3f2b96)";
        }
        document.body.style.background = style;
      }
      applyBackgroundImmediately(savedBackground);
    })();
  </script>

    @keyframes fade-in {
      0% { opacity: 0; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }

    .map-container {
      width: 100%;

      position: relative;

    .map-container iframe {
      width: 100%;

    .loading-spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--primary-color, #FFD700);
      z-index: 10;
    }
    
    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid #FFD700;
      border-top: 4px solid transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 10px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .favorites-section {
      background: var(--card-bg, rgba(28, 46, 74, 0.8));
      border-radius: 12px;

    .favorites-header {

      justify-content: space-between;

    }
    
    .favorites-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .favorite-item {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 215, 0, 0.2);
      border-radius: 8px;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
    }
    
    .favorite-item:hover {
      background: rgba(255, 215, 0, 0.2);
      transform: translateY(-2px);
    }
    
    .favorite-name {
      color: var(--text-light, #ffffff);
      font-size: 0.9em;
      cursor: pointer;
    }
    
    .favorite-delete {
      background: var(--error-color, #ff6b6b);
      border: none;
      border-radius: 4px;
      color: white;
      padding: 4px 8px;
      font-size: 0.8em;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .favorite-delete:hover {
      background: #ff5252;
      transform: scale(1.05);
    }
    
    @media (max-width: 768px) {
      .map-container {
        height: 400px;
        margin: 15px 10px;
      }

<script>
  let currentCoords = { latitude: null, longitude: null };
  let currentLayer = 'rain';
  
  // Initialize map with default location (Sofia, Bulgaria)
  const defaultLat = 42.6977;
  const defaultLon = 23.3219;
  
  function updateMap(lat, lon, layer = currentLayer) {
      // Prevent updates if map is not visible
      const mapContainer = document.getElementById('mapContainer');
      if (!mapContainer || mapContainer.style.display === 'none') {
          return;
      }

      currentCoords.latitude = lat;
      currentCoords.longitude = lon;
      currentLayer = layer;
      
      // Use a fixed zoom level based on initial device width
      // This prevents zoom changes when keyboard appears/disappears
      const zoomLevel = window.outerWidth <= 480 ? 7 : 8;
    
      // Use outer width for mobile detection to avoid keyboard influence
      const isMobile = window.outerWidth <= 768;
    
    const windyBaseURL = 'https://embed.windy.com/embed2.html';
    const mapURL = `${windyBaseURL}?lat=${lat}&lon=${lon}&detailLat=${lat}&detailLon=${lon}&width=100%&height=100%&zoom=${zoomLevel}&level=surface&overlay=${layer}&product=ecmwf&menu=&message=&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=default&metricTemp=default&radarRange=-1${isMobile ? '&mobile=true' : ''}`;
    
    const iframe = document.getElementById('windyMap');
    const spinner = document.getElementById('loadingSpinner');
    
    // Show loading spinner
    spinner.style.display = 'flex';
    iframe.style.display = 'none';
    
    iframe.src = mapURL;
    
    // Hide spinner when iframe loads
    iframe.onload = function() {
      setTimeout(() => {
        spinner.style.display = 'none';
        iframe.style.display = 'block';
        
        // Focus on the map when it's loaded
        const mapContainer = document.getElementById('mapContainer');
        if (mapContainer) {
          mapContainer.focus();
          // Make map container focusable
          if (!mapContainer.hasAttribute('tabindex')) {
            mapContainer.setAttribute('tabindex', '0');
          }
        }
        
        // For mobile devices, adjust iframe content scale if needed
        if (isMobile) {
          try {
            // Apply mobile-specific optimizations to the iframe content if possible
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            if (iframeDoc) {
              // Add viewport meta tag for proper scaling
              const meta = iframeDoc.createElement('meta');
              meta.name = 'viewport';
              meta.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no';
              iframeDoc.head.appendChild(meta);
              
              // Add touch-friendly styles
              const style = iframeDoc.createElement('style');
              style.textContent = `
                .leaflet-control-zoom a {
                  width: 36px !important;
                  height: 36px !important;
                  line-height: 36px !important;
                }
                .controls-btn {
                  padding: 12px !important;
                }
              `;
              iframeDoc.head.appendChild(style);
            }
          } catch (e) {
            // Security restrictions might prevent accessing iframe content
            console.log('Could not optimize iframe content for mobile');
          }
        }
      }, 1000);
    };
    
    // Update current layer display
    const layerSelect = document.getElementById('weatherLayer');
    const selectedOption = layerSelect.options[layerSelect.selectedIndex];
    document.getElementById('current-layer').textContent = `Layer: ${selectedOption.text}`;
  }

  document.addEventListener('DOMContentLoaded', function() {
      const navHeader = document.querySelector('.nav-header');
      const mapContainer = document.getElementById('mapContainer');
      const cityInput = document.getElementById('city');
      const formContainer = document.querySelector('.form-container');
      
      // Prevent auto-scrolling to map on mobile devices
      if (cityInput) {
        let scrollPosition = 0;
        
        cityInput.addEventListener('focus', function(e) {
          console.log("DEBUG: City input focused on mobile");
          // Save current scroll position
          scrollPosition = window.scrollY;
          
          // Prevent automatic scrolling on mobile devices
          if (window.innerWidth <= 768) {
            console.log("DEBUG: Preventing scroll on mobile");
            // Small delay to let browser's default behavior happen first
            setTimeout(function() {
              // Scroll back to form container
              window.scrollTo(0, scrollPosition);
              // If needed, ensure form is visible
              formContainer.scrollIntoView({behavior: 'auto', block: 'start'});
            }, 50);
          }
        });
      }
      
      // Make map container focusable
      if (mapContainer && !mapContainer.hasAttribute('tabindex')) {
        mapContainer.setAttribute('tabindex', '0');
      }
      
      // Scroll to top to ensure header is visible
      window.scrollTo(0, 0);
    
    // Set default location values, but do not load map initially
    document.getElementById('latitude').value = defaultLat;
    document.getElementById('longitude').value = defaultLon;
    document.getElementById('city').value = 'Sofia';

    const loadMapBtn = document.getElementById('loadMap');
    if (loadMapBtn) {
      loadMapBtn.addEventListener('click', function() {
        const lat = parseFloat(document.getElementById('latitude').value);
        const lon = parseFloat(document.getElementById('longitude').value);
        const layer = document.getElementById('weatherLayer').value;
        
        // Show map container before loading
        document.getElementById('mapContainer').style.display = 'block';
        updateMap(lat, lon, layer);
      });
    }
    
    // Handle device orientation changes for responsive map
    window.addEventListener('resize', function() {
      const mapContainer = document.getElementById('mapContainer');
      const iframe = document.getElementById('windyMap');
      
      // Only handle resize for actual orientation changes, not keyboard
      const isOrientationChange = window.innerWidth !== window.outerWidth;
      
      // If map is loaded and it's an orientation change
      if (iframe && iframe.style.display === 'block' &&
          currentCoords.latitude && currentCoords.longitude &&
          isOrientationChange) {
        
        // Small delay to let the browser finish resizing
        setTimeout(function() {
          // Reload the map with current coordinates to optimize for new orientation
          updateMap(currentCoords.latitude, currentCoords.longitude, currentLayer);
        }, 300);
      }
    });
    
    // Add scroll listener to handle header visibility
    window.addEventListener('scroll', function() {
      // No need for the fixed header behavior on mobile - let it scroll naturally
    });
    
    // Allow keyboard navigation to continue normally after initial focus
    navHeader.addEventListener('keydown', function(e) {
      // If Tab key is pressed, let the default behavior happen
      if (e.key === 'Tab') {
        return true;
      }
    });
  });
</script>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const useLocationBtn = document.getElementById("useLocation");
    if (useLocationBtn) {
      useLocationBtn.addEventListener("click", () => {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            console.log("Latitude:", lat, "Longitude:", lon);
            
            document.getElementById('latitude').value = lat.toFixed(4);
            document.getElementById('longitude').value = lon.toFixed(4);
            
            // Show map container before loading
            document.getElementById('mapContainer').style.display = 'block';
            // Update coordinates but don't refresh map automatically
            document.getElementById('latitude').value = lat.toFixed(4);
            document.getElementById('longitude').value = lon.toFixed(4);
            
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
            .then(r => r.json())
            .then(g => {
              const address = g.address || {};
              const name = address.city || address.town || address.village || address.municipality || "";
              const country = address.country || "";
              updateSelectedCity(name, country, lat, lon);
            })
            .catch((err) => {
              console.error("Reverse geocoding error:", err);
              updateSelectedCity("", "", lat, lon);
            });

            function updateSelectedCity(name, country, lat, lon) {
              const selectedLocationText = _t ? _t('selectedLocation') : 'Selected location';
              
              if (name && country) {
                document.getElementById("selected-city").textContent = `${selectedLocationText}: ${name}, ${country}`;
                document.getElementById("city").value = name;
              } else {
                document.getElementById("selected-city").textContent = `${selectedLocationText}: coordinates (${lat.toFixed(4)}, ${lon.toFixed(4)})`;
              }
            }
          },
          (error) => {
            console.error("Error getting location:", error);
            alert("Failed to get location");
          }
        );
      });
    }

    // Load Map button
    const loadMapBtn = document.getElementById("loadMap");
    if (loadMapBtn) {
      loadMapBtn.addEventListener("click", () => {
        const city = document.getElementById("city").value.trim();
        const lat = parseFloat(document.getElementById("latitude").value);
        const lon = parseFloat(document.getElementById("longitude").value);
        const layer = document.getElementById("weatherLayer").value;
        
        if (lat && lon) {
          updateMap(lat, lon, layer);
          const selectedLocationText = _t ? _t('selectedLocation') : 'Selected location';
          if (city) {
            document.getElementById("selected-city").textContent = `${selectedLocationText}: ${city}`;
          } else {
            document.getElementById("selected-city").textContent = `${selectedLocationText}: (${lat.toFixed(4)}, ${lon.toFixed(4)})`;
          }
        } else if (city) {
          // Geocode the city
          fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&format=json`)
          .then(response => response.json())
          .then(data => {
            if (data.results && data.results.length > 0) {
              const result = data.results[0];
              document.getElementById("latitude").value = result.latitude;
              document.getElementById("longitude").value = result.longitude;
              updateMap(result.latitude, result.longitude, layer);
              const selectedLocationText = _t ? _t('selectedLocation') : 'Selected location';
              document.getElementById("selected-city").textContent = `${selectedLocationText}: ${result.name}, ${result.country}`;
            } else {
              alert("City not found");
            }
          })
          .catch(error => {
            console.error("Geocoding error:", error);
            alert("Error finding city");
          });
        } else {
          alert("Please enter a city or coordinates");
        }
      });
    }
    
    // Layer change handler - only updates current layer display
    const layerSelect = document.getElementById("weatherLayer");
    if (layerSelect) {
      layerSelect.addEventListener("change", () => {
        // Update the current layer display without refreshing the map
        const selectedOption = layerSelect.options[layerSelect.selectedIndex];
        document.getElementById('current-layer').textContent = `Layer: ${selectedOption.text}`;
      });
    }

    if (navigator.geolocation) {
      navigator.permissions.query({ name: 'geolocation' }).then(result => {
        if (result.state === 'granted') {
          console.log("Location services are granted.");
        } else if (result.state === 'prompt') {
          console.log("Location services prompt available.");
        } else if (result.state === 'denied') {
          console.log("Location services are blocked.");
        }
      });
    } else {
      console.log("Geolocation not supported");
    }
  });
</script>
